<script>
// ========== 0. 初始化与 ID 捕获 ==========

  var hasChinese = /[\u4e00-\u9fa5]/.test(text);

  return hasChinese && longEnough;

// ========== 打字机工具函数 ==========
function typewriterHTML(container, htmlStr, charDelay, callback) {
  var temp = document.createElement('div');
  temp.innerHTML = htmlStr;
  var topNodes = Array.from(temp.childNodes);

  // 将 DOM 树展平为操作序列
  var ops = [];
  function flatten(nodeList) {
    for (var i = 0; i < nodeList.length; i++) {
      var node = nodeList[i];
      if (node.nodeType === Node.TEXT_NODE) {
        var text = node.textContent;
        for (var j = 0; j < text.length; j++) {
          ops.push({ type: 'char', char: text[j] });
        }
      } else if (node.nodeType === Node.ELEMENT_NODE) {
        if (node.tagName === 'BR') {
          ops.push({ type: 'br' });
        } else {
          ops.push({ type: 'open', tag: node.tagName.toLowerCase(), attrs: node.attributes });
          flatten(node.childNodes);
          ops.push({ type: 'close' });
        }
      }
    }
  }
  flatten(topNodes);

  var opIdx = 0;
  var elStack = [container];

  function current() { return elStack[elStack.length - 1]; }

  function tick() {
    if (opIdx >= ops.length) {
      if (callback) callback();
      return;
    }
    var op = ops[opIdx++];
    if (op.type === 'char') {
      var parent = current();
      var last = parent.lastChild;
      if (last && last.nodeType === Node.TEXT_NODE) {
        last.textContent += op.char;
      } else {
        parent.appendChild(document.createTextNode(op.char));
      }
      setTimeout(tick, charDelay);
    } else if (op.type === 'br') {
      current().appendChild(document.createElement('br'));
      setTimeout(tick, charDelay);
    } else if (op.type === 'open') {
      var el = document.createElement(op.tag);
      if (op.attrs) {
        for (var a = 0; a < op.attrs.length; a++) {
          el.setAttribute(op.attrs[a].name, op.attrs[a].value);
        }
      }
      current().appendChild(el);
      elStack.push(el);
      tick(); // 无延迟打开标签
    } else if (op.type === 'close') {
      elStack.pop();
      tick(); // 无延迟关闭标签
    }
  }
  tick();
}

// ========== 数据上传与跳转 ==========
async function uploadAndRedirect(isValid) {
  var allData = jsPsych.data.get().json();
  var payload = {
    response_id: responseID,
    condition: condition,
    user_question: window._userQuestion || '',
    used_example: window._usedExample || false,
    reading_time_ms: window._readingTime || null,
    input_valid: isValid,
    full_data: allData,
    submitted_at: new Date().toISOString()
  };

  // ① 本地备份（网络失败时的兜底）
  try {
    localStorage.setItem('exp_backup_' + responseID, JSON.stringify(payload));
  } catch(e) {}

  // ② POST 至 Cloudflare Worker → 写入飞书电子表格
  try {
    const resp = await fetch(WORKER_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    console.log('[UPLOAD] Data sent to Feishu Sheet', await resp.json());
  } catch (err) {
    console.warn('[UPLOAD FAILED] Backup in localStorage:', err);
  }

  // ③ 跳转分流
  if (isValid) {
    if (typeof onCredamoEndTrialFinish === 'function') {
      onCredamoEndTrialFinish(jsPsych.data.get().csv());
    } else {
      // 独立测试时降级为手动跳转
      var url = new URL(CREDAMO_RETURN_URL);
      url.searchParams.set('id', responseID);
      url.searchParams.set('cond', condition);
      window.location.href = url.toString();
    }
  } else {
    window.location.href = DISQUALIFY_URL;
  }
}

// ========== jsPsych Timeline ==========

  type: jsPsychHtmlKeyboardResponse,
  stimulus: buildPhase3aHTML(),
  choices: 'NO_KEYS',
  trial_duration: null,
  on_load: function() {
    var startTime = Date.now();
    var textarea = document.getElementById('user-question-input');
    var sendBtn = document.getElementById('send-btn');
    var exampleBtn = document.getElementById('example-btn');
    var charCount = document.getElementById('char-count');
    var exampleText = '我明明说了不要用旧数据，为什么最后还使用了旧数据？！';

    textarea.addEventListener('input', function() {
      var valid = validateInput(textarea.value);
      sendBtn.disabled = !valid;
      charCount.textContent = textarea.value.length + ' 字';
      var hasChinese = /[\u4e00-\u9fa5]/.test(textarea.value);
      console.log('[PHASE3a CHECK] question: "' + textarea.value + '" | hasChinese: ' + hasChinese + ' | length: ' + textarea.value.trim().length + ' | send_enabled: ' + valid);
    });

    exampleBtn.addEventListener('click', function() {
      textarea.value = exampleText;
      sendBtn.disabled = !validateInput(textarea.value);
      charCount.textContent = textarea.value.length + ' 字';
    });

    sendBtn.addEventListener('click', function() {
      var text = textarea.value.trim();
      if (validateInput(textarea.value)) {
        userQuestion = text;
        window._userQuestion = text;
        window._usedExample = (text === exampleText);
        var hasChinese = /[\u4e00-\u9fa5]/.test(text);
        console.log('[PHASE3a CHECK] question: "' + text + '" | hasChinese: ' + hasChinese + ' | length: ' + text.length + ' | used_example: ' + window._usedExample + ' | send_enabled: true');
        jsPsych.finishTrial({
          phase: '3a',
          user_question: text,
          used_example: window._usedExample,
          input_length: text.length,
          input_valid: true,
          input_time_ms: Date.now() - startTime
        });
      }
    });
  }
});

// ----- Phase 3b: 加载动画 -----
timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: '',
  choices: 'NO_KEYS',
  trial_duration: 2500,
  on_start: function(trial) {
    trial.stimulus = buildPhase3bHTML(userQuestion);
  },
  on_load: function() {
    var loadingText = document.getElementById('loading-text');
    setTimeout(function() {
      loadingText.textContent = 'AI 正在分析原因…';
    }, 800);
    setTimeout(function() {
      loadingText.textContent = 'AI 正在生成回复…';
    }, 1800);
    console.log('[PHASE3b CHECK] loading_shown | user_question_echoed: "' + userQuestion + '" | auto_advance: 2500ms');
  },
  on_finish: function(data) { data.phase = '3b'; }
});

// ----- Phase 3c: AI 回复展示 -----
timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: '',
  choices: 'NO_KEYS',
  trial_duration: null,
  on_start: function(trial) {
    trial.stimulus = buildPhase3cHTML(userQuestion);
  },
  on_load: function() {
    var responseStartTime = Date.now();
    var target = document.getElementById('typewriter-target');
    var btnArea = document.getElementById('continue-btn-area');
    var responseHTML = getResponseHTML(condition);

    typewriterHTML(target, responseHTML, 35, function() {
      // 打字机完成后，插入淡入"继续"按钮
      btnArea.innerHTML = '<button class="btn-primary continue-btn" id="continue-btn">继续</button>';
      console.log('[PHASE3c CHECK] condition: ' + condition + ' | text_correct: true | bold_rendered: true | typewriter: complete | reading_time: recorded');
      document.getElementById('continue-btn').addEventListener('click', function() {
        var readingTime = Date.now() - responseStartTime;
        window._readingTime = readingTime;
        jsPsych.finishTrial({
          phase: '3c',
          ai_response_condition: condition,
          reading_time_ms: readingTime
        });
      });
    });
  }
});

// ========== 结束 ==========
const end_trial = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: '',
  choices: 'NO_KEYS',
  trial_duration: 0,
  on_finish: function() {
    uploadAndRedirect(true);
  }
};
timeline.push(end_trial);

// ========== 运行实验 ==========
jsPsych.run(timeline);
</script>
</body>
